steps:
  - name: Generate snake animation
    uses: Platane/snk@v3
    with:
      github_user_name: shiva676466
      outputs: |
        dist/snake.svg

  - name: Push to output branch
    uses: crazy-max/ghaction-github-pages@v3
    with:
      target_branch: output
      build_dir: dist
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
